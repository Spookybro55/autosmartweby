name: Scrape (A-11)

# A-11: Manual + API-driven scrape job runner.
# Triggered via workflow_dispatch from POST /api/scrape/trigger
# (Vercel route → GitHub API). Runs the firmy.cz scraper (or future
# portals) and POSTs the result back to the Apps Script Web App
# `ingestScrapedRows` action with the per-job authentication token.

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: "Scrape job ID (registered in _scrape_history by AS triggerScrape)"
        required: true
        type: string
      jobToken:
        description: "Per-job auth token (UUID, generated by AS, used in ingest callback)"
        required: true
        type: string
      portal:
        description: "Source portal — e.g. firmy.cz"
        required: true
        type: choice
        options:
          - firmy.cz
      segment:
        description: "Segment / řemeslo (e.g. instalatér)"
        required: true
        type: string
      city:
        description: "Město (e.g. Praha)"
        required: true
        type: string
      district:
        description: "Městská část (optional)"
        required: false
        default: ""
        type: string
      max_results:
        description: "Max results 1-500"
        required: false
        default: "30"
        type: string

jobs:
  scrape:
    name: Scrape ${{ inputs.portal }} — ${{ inputs.segment }} / ${{ inputs.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JOB_ID: ${{ inputs.jobId }}
      JOB_TOKEN: ${{ inputs.jobToken }}
      PORTAL: ${{ inputs.portal }}
      SEGMENT: ${{ inputs.segment }}
      CITY: ${{ inputs.city }}
      DISTRICT: ${{ inputs.district }}
      MAX_RESULTS: ${{ inputs.max_results }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build A-01 ScrapingJobInput
        id: build-job
        run: |
          mkdir -p .scrape-tmp
          JOB_FILE=".scrape-tmp/${JOB_ID}.json"
          NOW_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # source_job_id mirrors A-01 contract format used by scraper internals
          SOURCE_JOB_ID="ghactions-${JOB_ID}"

          cat > "$JOB_FILE" <<EOF
          {
            "schema_version": "1.0",
            "source_job_id": "${SOURCE_JOB_ID}",
            "portal": "${PORTAL}",
            "segment": "${SEGMENT}",
            "city": "${CITY}",
            "district": $( [ -z "$DISTRICT" ] && echo "null" || echo "\"${DISTRICT}\"" ),
            "max_results": ${MAX_RESULTS},
            "job_created_at": "${NOW_ISO}",
            "job_status": "created",
            "job_started_at": null,
            "job_completed_at": null,
            "error_message": null
          }
          EOF
          echo "job_file=$JOB_FILE" >> $GITHUB_OUTPUT
          echo "===== A-01 job ====="
          cat "$JOB_FILE"

      - name: Run scraper (live mode)
        id: run-scraper
        run: |
          OUT_FILE=".scrape-tmp/${JOB_ID}-out.json"
          # Portal dispatch — when more portals exist, this becomes a switch
          # on PORTAL. For now firmy.cz is the only implemented scraper.
          case "$PORTAL" in
            firmy.cz)
              node scripts/scraper/firmy-cz.mjs \
                --job "${{ steps.build-job.outputs.job_file }}" \
                --mode live \
                --out "$OUT_FILE"
              ;;
            *)
              echo "::error::Unsupported portal: $PORTAL"
              exit 1
              ;;
          esac
          echo "out_file=$OUT_FILE" >> $GITHUB_OUTPUT
          echo "===== Scraper output (head) ====="
          head -c 2000 "$OUT_FILE" || true
          echo
          echo "===== rows count ====="
          node -e "const d=require('./${OUT_FILE}'); console.log((d.rows||[]).length, 'rows;', (d.errors||[]).length, 'errors')"

      - name: POST results to Apps Script ingest
        if: success()
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          FRONTEND_API_SECRET: ${{ secrets.FRONTEND_API_SECRET }}
        run: |
          if [ -z "$APPS_SCRIPT_WEB_APP_URL" ] || [ -z "$FRONTEND_API_SECRET" ]; then
            echo "::error::APPS_SCRIPT_WEB_APP_URL or FRONTEND_API_SECRET secret not set in repo. Configure in Settings → Secrets."
            exit 1
          fi

          OUT_FILE="${{ steps.run-scraper.outputs.out_file }}"
          # Extract just the rows array — that's what writeRawImportRows_ expects
          ROWS_JSON=$(node -e "
            const d = require('./$OUT_FILE');
            process.stdout.write(JSON.stringify(d.rows || []));
          ")

          PAYLOAD=$(node -e "
            const rows = $ROWS_JSON;
            process.stdout.write(JSON.stringify({
              action: 'ingestScrapedRows',
              jobId: process.env.JOB_ID,
              jobToken: process.env.JOB_TOKEN,
              token: process.env.FRONTEND_API_SECRET,
              rows: rows
            }));
          ")

          echo "POSTing $(echo "$ROWS_JSON" | node -e 'console.log(JSON.parse(require("fs").readFileSync(0,"utf8")).length)') rows to AS…"

          # Apps Script Web Apps redirect 302 to googleusercontent.com — follow it.
          HTTP_RESP=$(curl -sS -L -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -w "\n___HTTP_CODE___%{http_code}" \
            "$APPS_SCRIPT_WEB_APP_URL")

          BODY=$(echo "$HTTP_RESP" | sed -e '/___HTTP_CODE___/,$d')
          CODE=$(echo "$HTTP_RESP" | grep -oP '___HTTP_CODE___\K\d+')

          echo "AS HTTP $CODE"
          echo "Body: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "::error::AS ingest returned HTTP $CODE"
            exit 1
          fi

          # Check ok=true in response
          OK=$(echo "$BODY" | node -e "
            try { const d = JSON.parse(require('fs').readFileSync(0, 'utf8')); console.log(d.ok === true ? 'true' : 'false'); }
            catch(e) { console.log('false'); }
          ")
          if [ "$OK" != "true" ]; then
            echo "::error::AS returned ok=false"
            exit 1
          fi

      - name: Report failure to Apps Script
        if: failure()
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          FRONTEND_API_SECRET: ${{ secrets.FRONTEND_API_SECRET }}
        run: |
          if [ -z "$APPS_SCRIPT_WEB_APP_URL" ] || [ -z "$FRONTEND_API_SECRET" ]; then
            echo "Secrets unavailable, can't report failure to AS."
            exit 0
          fi
          PAYLOAD=$(node -e "
            process.stdout.write(JSON.stringify({
              action: 'ingestScrapedRows',
              jobId: process.env.JOB_ID,
              jobToken: process.env.JOB_TOKEN,
              token: process.env.FRONTEND_API_SECRET,
              error_message: 'GH Actions workflow failed — see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            }));
          ")
          curl -sS -L -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$APPS_SCRIPT_WEB_APP_URL" || true
          echo "Failure callback sent."
